<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Detector - Harmonix</title>
    <!-- CSS Links -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .submit-btn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 40px;
            height: 40px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    {% include '_navbar.html' %}
    <div class="container">
        <div class="page-header">
            <div class="page-header-text">
                <h1>Rhythm Detector</h1>
                <p>Analyze tempo and meter from audio recordings</p>
            </div>
            <div class="page-header-illustration">
                <div class="illustration-rhythm">
                    <div class="rhythm-bar"></div>
                    <div class="rhythm-bar"></div>
                    <div class="rhythm-bar"></div>
                    <div class="rhythm-bar"></div>
                    <div class="rhythm-dot"></div>
                </div>
            </div>
        </div>
        <!-- File Upload Section -->
        <form id="rhythmForm" enctype="multipart/form-data">
            <div class="file-upload">
                <input type="file" id="audioFile" name="audio_file" accept=".wav,.mp3,.flac,.ogg,.m4a" style="display: none;">
                <label for="audioFile" class="upload-btn">Choose Audio File</label>
                <p>Supported formats: WAV, MP3, FLAC, OGG, M4A</p>
                <div id="fileSelected" style="display: none;">
                    <p>Selected file: <span id="fileName"></span></p>
                </div>
            </div>
            
            <div id="analyzeBtnContainer" style="display: none; text-align: center; margin-top: 20px;">
                <button type="submit" class="submit-btn">Analyze Rhythm</button>
            </div>
        </form>
        
        <!-- Loading Spinner -->
        <div id="loadingSpinner" style="display: none; text-align: center; margin: 30px 0;">
            <div class="spinner"></div>
            <p>Analyzing rhythm...</p>
        </div>
        
        <!-- Error Box -->
        <div id="errorBox" class="error-box" style="display: none; background: rgba(255, 0, 0, 0.2); padding: 15px; border-radius: 8px; color: #ff7675; text-align: center; margin-top: 20px;"></div>
        
        <!-- Result Section -->
        <div id="resultSection" style="display: none; margin-top: 30px;">
            <div class="prediction-card">
                <div class="card-header">Rhythm Analysis</div>
                <div class="card-body">
                    <div style="font-size: 24px; margin-bottom: 15px;">Tempo: <span id="tempoResult" class="genre-text" style="color: #00cec9;"></span> BPM</div>
                    <div style="font-size: 24px;">Time Signature: <span id="signatureResult" class="genre-text" style="color: #fd79a8;"></span></div>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            © 2025 Sigmoid Innovations.
        </div>
    </div>
    
    <script>
        // Simple script for this page
        const fileInput = document.getElementById('audioFile');
        const fileSelected = document.getElementById('fileSelected');
        const fileName = document.getElementById('fileName');
        const analyzeBtnContainer = document.getElementById('analyzeBtnContainer');
        const form = document.getElementById('rhythmForm');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const resultSection = document.getElementById('resultSection');
        const errorBox = document.getElementById('errorBox');
        
        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                fileSelected.style.display = 'block';
                fileName.textContent = this.files[0].name;
                analyzeBtnContainer.style.display = 'block';
            }
        });
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            loadingSpinner.style.display = 'block';
            resultSection.style.display = 'none';
            errorBox.style.display = 'none';
            
            fetch('/analyze-rhythm', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loadingSpinner.style.display = 'none';
                if (data.error) {
                    errorBox.textContent = data.error;
                    errorBox.style.display = 'block';
                } else {
                    document.getElementById('tempoResult').textContent = data.tempo;
                    document.getElementById('signatureResult').textContent = data.time_signature;
                    resultSection.style.display = 'block';
                }
            })
            .catch(error => {
                loadingSpinner.style.display = 'none';
                errorBox.textContent = 'An error occurred during analysis.';
                errorBox.style.display = 'block';
                console.error(error);
            });
        });
    </script>
    {% include '_mood_assistant.html' %}
</body>
</html>
