<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Harmonix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 420px;
            margin: 60px auto;
            padding: 32px 30px 28px;
            background: rgba(18, 18, 18, 0.92);
            border-radius: 18px;
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 215, 0, 0.35);
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.9);
        }
        .form-group { margin-bottom: 20px; }
        .form-control {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .btn-primary:hover {
            background: #5b4cc4;
        }
        .alert {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            color: white;
        }
        .alert-danger { background-color: rgba(255, 118, 117, 0.95); }
        .alert-success { background-color: rgba(0, 184, 148, 0.95); }
    </style>
</head>
<body>
    {% include '_navbar.html' %}
    <div class="container">
        <div class="auth-container">
            <h2 style="text-align: center; color: white; margin-bottom: 30px;">Register</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
            <form method="POST" action="">
                <div class="form-group">
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Register</button>
            </form>
            <p style="text-align: center; margin-top: 15px; color: white;">
                Already have an account? <a href="{{ url_for('login') }}" style="color: #a29bfe;">Login</a>
            </p>
        </div>
    </div>
    {% include '_mood_assistant.html' %}
</body>
</html>
